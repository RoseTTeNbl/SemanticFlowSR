seed: 0
out: checkpoints
checkpoint_name: paper_onestep_d1.pt
num_tasks: 32
max_support: 12
eval_every: 20
path:
  name: semantic_fisher_pullback
  gamma: 0.1
  gram_rank: 8
  step_dt: 0.5
update:
  mode: fixed_beta
  beta: 1.0
flow_training:
  train_along_path: true
  num_time_samples: 2
  target_integration_steps: 2
runtime:
  torch_num_threads: 4
  torch_num_interop_threads: 2
data:
  cache_static: true
  device: cpu
gen:
  num_vars: 1
  max_depth: 4
  K: 8
  probe_size: 24
  ops: [add, sub, mul, protected_div, sin, cos, square, cube, exp, protected_log, protected_sqrt]
energy:
  lambda_rank: 0.0
  lambda_move: 0.0
  lambda_op: 0.01
  projection: ridge
  rho: 0.001
target:
  name: one_step_advantage
  center: true
  normalize: true
  floor: 0.001
  importance_correction: true
support:
  mode: adaptive_full
  full_threshold: 256
  topk: 6
model:
  output_mode: semantic_fisher_lograte
  hidden: 64
  row_layers: 2
  heads: 4
train:
  lr: 0.0005
  steps: 40
  batch_size: 4
  loss_name: semantic_fisher_velocity
  sf_step_dt: 0.5
  grad_clip: 1.0
  log_every: 20
