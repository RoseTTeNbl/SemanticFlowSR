seed: 0
algorithm: conditional_semantic_edge_flow
out: checkpoints
checkpoint_name: conditional_edge_flow_symbolicgpt_subset_carry_linear_e10_s32_gpu.pt
runtime:
  torch_num_threads: 4
  torch_num_interop_threads: 1
  device: cuda:1
data:
  source: symbolicgpt_subset
  root: data/generated/symbolicgpt_subset
  splits:
    - train
  validation_splits:
    - val
  early_stopping_limit_tasks: 64
  limit_tasks: 256
  train_fraction: 0.8
  max_train_points: 80
template:
  num_vars: 3
  num_registers: 8
  num_layers: 3
  mixture_modes: 1
  primitives:
    - add
    - sub
    - mul
    - protected_div
    - sin
    - cos
    - square
    - cube
    - protected_log
    - protected_sqrt
model:
  hidden: 96
  head_terms: 3
  branches_per_register: 1
  update_mode: carry_write
  write_registers_per_layer: 4
  task_encoder: pointnet
  exclude_base_head_candidates: true
  enable_keep_option: true
  mask_duplicate_branches: true
  include_base_source_pool: false
train:
  epochs: 10
  samples_per_task: 32
  elite_k: 4
  objective: semantic_teacher
  elite_rank_temperature: 0.05
  sampler_method: policy
  flow_steps: 1
  validation_fraction: 0.25
  complexity_weight: 0.0
  semantic_beta: 1.0
  structure_beta: 4.0
  posterior_complexity_beta: 0.0
  teacher_beta: 1.0
  teacher_smoothing: 0.03
  teacher_pinv_rtol: 0.01
  teacher_velocity_clip: 5.0
  teacher_loss_weight: 1.0
  active_nll_weight: 0.05
  teacher_time_sampling: uniform
  lr: 0.001
  grad_clip: 1.0
  task_batch_size: 4
  replay_capacity: 128
  replay_ratio: 0.5
  head_fit_mode: linear
  unique_elites: true
  entropy_bonus: 0.001
  inject_gt_elite: true
  early_stopping_patience: 3
  early_stopping_samples: 8
  proposal_sources:
    - gp
  proposal_count: 8
  proposal_compile_only_trainable: true
  gp_population_size: 24
  gp_generations: 2
  gp_max_depth: 3
