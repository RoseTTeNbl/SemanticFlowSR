seed: 0
algorithm: conditional_semantic_edge_flow
out: checkpoints
checkpoint_name: conditional_edge_flow_smoke.pt
num_tasks: 2
runtime:
  torch_num_threads: 4
  torch_num_interop_threads: 1
template:
  num_vars: 1
  num_registers: 4
  num_layers: 2
  mixture_modes: 1
  primitives:
    - add
    - mul
    - square
gen:
  max_depth: 3
  probe_size: 32
model:
  hidden: 48
  head_terms: 3
train:
  epochs: 2
  samples_per_task: 32
  elite_k: 8
  objective: semantic_teacher
  sampler_method: policy
  flow_steps: 4
  complexity_weight: 0.001
  semantic_beta: 1.0
  structure_beta: 2.0
  posterior_complexity_beta: 0.001
  teacher_beta: 1.0
  teacher_smoothing: 0.05
  teacher_pinv_rtol: 0.01
  teacher_velocity_clip: 5.0
  teacher_loss_weight: 1.0
  active_nll_weight: 0.05
  teacher_time_sampling: uniform
  inject_gt_elite: true
  lr: 0.001
  grad_clip: 1.0
