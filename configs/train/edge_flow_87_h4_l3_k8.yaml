seed: 0
algorithm: fixed_theta_edge_flow
out: checkpoints
checkpoint_name: edge_flow_87_h4_l3_k8.pt
runtime:
  torch_num_threads: 4
  torch_num_interop_threads: 1
data:
  source: benchmark_87
  manifest: data/benchmark_suites/benchmark_manifest.json
  manifest_root: data/benchmark_suites
  suites:
    - nguyen
    - constant
    - livermore
    - jin
  legacy_87: true
  feynman_root: data/materialized/feynman
template:
  num_vars: 3
  num_registers: 8
  num_layers: 3
  mixture_modes: 4
  primitives:
    - add
    - sub
    - mul
    - protected_div
    - sin
    - cos
    - square
    - cube
    - protected_log
    - protected_sqrt
model:
  hidden: 96
train:
  epochs: 2
  samples_per_task: 384
  elite_k: 8
  projection_mode: per_mode_topk
  validation_fraction: 0.25
  target_smoothing: 0.01
  complexity_weight: 0.001
  lr: 0.001
  grad_clip: 1.0
