outer_loop:
  num_iterations: 3
  snapshot_dir: checkpoints/proximal_snapshots
  target_cache_dir: data/proximal_targets
policy_start:
  source: snapshot
  fallback: grammar
target:
  name: rollout_value_advantage
  advantage_eps: 0.000001
  advantage_clip: 5.0
update:
  mode: fixed_beta
  beta: 1.0
path:
  name: semantic_fisher_pullback
  gamma: 0.1
  step_dt: 1.0
rollout:
  n_rollouts_per_action: 4
  max_completion_steps: 4
  completion_policy: mixed
  aggregation: topk_mean
  topk: 2
  fitness: normalized_energy_improvement
  complexity_penalty: 0.01
support:
  mode: mixed_topk_random
  max_support: 64
  topk_one_step: 32
  random_k: 32
logging:
  save_target_records: true
  record_rollout_metadata: true
