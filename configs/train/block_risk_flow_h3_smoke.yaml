seed: 0
out: checkpoints
checkpoint_name: block_risk_flow_h3_smoke.pt
num_tasks: 4
gen:
  num_vars: 1
  max_depth: 3
  K: 6
  probe_size: 16
  ops: [add, mul, square]
energy:
  lambda_rank: 0.0
  lambda_move: 0.0
  lambda_op: 0.0
  projection: ridge
  rho: 0.001
block:
  size: 3
sampling:
  num_trajectories: 6
  max_blocks: 1
  block_pool_budget: 24
risk:
  mode: top_alpha
  alpha: 0.25
  normalize: rank
flow:
  beta: 1.0
  gamma: 0.1
  gram_rank: 8
  num_time_samples: 1
model:
  hidden: 64
train:
  lr: 0.0005
  steps: 10
  batch_size: 2
  grad_clip: 1.0
  log_every: 5
