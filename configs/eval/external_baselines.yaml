# External comparison baseline matrix.
#
# DEAP and gplearn may also be installed in the main semflow environment for
# GP-assisted SFSR tooling and smoke checks. Paper-comparison runs should still
# be treated as external baseline jobs with their own method tags and budgets.

manifest: data/benchmark_suites/benchmark_manifest.json
root: data/benchmark_suites
out: results/external_baselines

suite_groups:
  benchmark_nguyen:
    - nguyen
  benchmark_constant:
    - constant
  benchmark_livermore:
    - livermore
  benchmark_jin:
    - jin
  formula_dev:
    - nguyen
    - constant
    - livermore
    - jin
  srsd_main:
    - srsd_feynman_easy
    - srsd_feynman_medium
    - srsd_feynman_hard
  srsd_dummy:
    - srsd_feynman_easy_dummy
    - srsd_feynman_medium_dummy
    - srsd_feynman_hard_dummy
  pmlb:
    - pmlb_regression
  all_complete:
    - nguyen
    - constant
    - livermore
    - jin
    - srsd_feynman_easy
    - srsd_feynman_medium
    - srsd_feynman_hard
    - srsd_feynman_easy_dummy
    - srsd_feynman_medium_dummy
    - srsd_feynman_hard_dummy
    - pmlb_regression

methods:
  - id: DEAP
    role: external_comparison
    env: deap
    script: scripts/run_deap_baseline.py
    args:
      generations: 40
      population_size: 1000

  - id: gplearn
    role: external_comparison
    env: gplearn
    script: scripts/run_gplearn_baseline.py
    args:
      generations: 20
      population_size: 1000

  - id: PySR
    role: external_comparison
    env: pysr
    script: scripts/run_pysr_baseline.py
    args:
      niterations: 100

  - id: DSO
    role: external_comparison
    env: dso37
    script: scripts/run_dsr_baseline.py
    args:
      n_samples: 100000

  - id: TPSR-E2E
    role: external_comparison
    env: tpsr
    script: scripts/run_tpsr_manifest_baseline.py
    args:
      mode: e2e
      beam_size: 1
      n_trees_to_refine: 1
      max_input_points: 64
      max_number_bags: 1

  - id: LocalDiffusionProposal
    role: external_comparison
    env: current
    script: scripts/run_diffusion_sr_baseline.py
    args:
      diffusion_root: external/Symbolic_Regression_With_Diffusion_Models
      proposal_limit: 2000
      candidate_limit: 512

  - id: SymGPT
    role: external_comparison
    env: current
    script: scripts/run_symbolicgpt_baseline.py
    args:
      repo_root: external/symbolicgpt

  - id: NeSymReS
    role: external_comparison
    env: current
    script: scripts/run_nesymres_baseline.py
    args:
      repo_root: external/NeuralSymbolicRegressionThatScales

  - id: E2E
    role: external_comparison
    env: tpsr
    script: scripts/run_e2e_baseline.py
    args:
      tpsr_root: external/TPSR
      model_path: symbolicregression/weights/model1.pt
      beam_size: 1
      n_trees_to_refine: 1
      max_input_points: 64
      max_number_bags: 1

  - id: HVAE
    role: external_comparison
    env: current
    script: scripts/run_hvae_baseline.py
    args:
      repo_root: external/HVAE

  - id: NGGP
    role: external_comparison
    env: current
    script: scripts/run_nggp_baseline.py
    args:
      repo_root: external/deep-symbolic-optimization-pytorch

  - id: TPSR
    enabled: false
    role: native_protocol_reference
    env: tpsr
    script: external/TPSR/run.py
    accepts_manifest: false
    args:
      eval_on_pmlb: true
      beam_type: sampling
      beam_size: 10
      n_trees_to_refine: 10
      max_input_points: 200
      max_number_bags: 10
      save_results: true
