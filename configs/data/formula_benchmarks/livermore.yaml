# Livermore benchmark subset (standard SR definitions). x->x0, y->x1, z->x2.
- {name: Livermore-1, suite: livermore, expr: "1.0/3.0 + x0 + sin(x0**2)", variables: [x0], train: {sampler: uniform, range: [-3, 3], n: 256}, test: {sampler: uniform, range: [-3, 3], n: 1024}}
- {name: Livermore-2, suite: livermore, expr: "sin(x0**2)*cos(x0) - 2", variables: [x0], train: {sampler: uniform, range: [-1, 1], n: 256}, test: {sampler: uniform, range: [-1, 1], n: 1024}}
- {name: Livermore-3, suite: livermore, expr: "sin(x0**3)*cos(x0**2) - 1", variables: [x0], train: {sampler: uniform, range: [-1, 1], n: 256}, test: {sampler: uniform, range: [-1, 1], n: 1024}}
- {name: Livermore-4, suite: livermore, expr: "log(x0 + 1) + log(x0**2 + 1) + log(x0)", variables: [x0], train: {sampler: uniform, range: [0, 2], n: 256}, test: {sampler: uniform, range: [0, 2], n: 1024}}
- {name: Livermore-5, suite: livermore, expr: "x0**4 - x0**3 + x0**2 - x1", variables: [x0, x1], train: {sampler: uniform, range: [0, 1], n: 256}, test: {sampler: uniform, range: [0, 1], n: 1024}}
- {name: Livermore-6, suite: livermore, expr: "4*x0**4 + 3*x0**3 + 2*x0**2 + x0", variables: [x0], train: {sampler: uniform, range: [-1, 1], n: 256}, test: {sampler: uniform, range: [-1, 1], n: 1024}}
- {name: Livermore-7, suite: livermore, expr: "(exp(x0) - exp(-x0))/2", variables: [x0], train: {sampler: uniform, range: [-1, 1], n: 256}, test: {sampler: uniform, range: [-1, 1], n: 1024}}
- {name: Livermore-8, suite: livermore, expr: "(exp(x0) + exp(-x0))/3", variables: [x0], train: {sampler: uniform, range: [-1, 1], n: 256}, test: {sampler: uniform, range: [-1, 1], n: 1024}}
